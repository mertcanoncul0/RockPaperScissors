<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="/main.css">
    <script src="/main.js" defer></script>
  </head>
  <body>
    <h1>Rock Paper Scissors!</h1>
    
    <div>
      <button class="rule-button" data-rule-button>Rock</button>
      <button class="rule-button" data-rule-button>Paper</button>
      <button class="rule-button" data-rule-button>Scissors</button>
    </div>

    <div class="game-message">
      <span>Game Result: <span data-message>...</span></span><br>
      <span>Player Score: <span data-player-score>0</span></span><br>
      <span>Cpu Score: <span data-cpu-score>0</span></span>
    </div>
  </body>
</html>
